version: "2"

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nestif
    - noctx
    - nolintlint
    - prealloc
    - rowserrcheck
    - staticcheck
    - testpackage
    - unconvert
    - unparam
    - unused
    - whitespace
    - wsl_v5
  disable:
    - gochecknoglobals
    - godox
    - err113
    - goheader
    - gomodguard
    - nlreturn
    - sqlclosecheck
    - depguard
  settings:
    goconst:
      # goconst defaults in golangci-lint v2.12 are aggressive enough to flag
      # short, generic strings ("pods", "true", "cluster", log-field keys) and
      # test-table fixtures, neither of which benefit from extraction. Restore
      # the pre-v2.12 signal/noise ratio:
      #   * ignore-tests skips repeated literals in *_test.go (table-driven
      #     tests intentionally inline values for readability),
      #   * min-len rules out 3-char generic Kubernetes nouns,
      #   * min-occurrences keeps the linter focused on truly recurring values.
      ignore-tests: true
      min-len: 4
      min-occurrences: 5

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofmt:
      simplify: true
